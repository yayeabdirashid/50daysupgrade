<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Gym 50 Maalmood</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #0f0f1a;
    --bg3: #141428;
    --card: #12121e;
    --card2: #1a1a2e;
    --accent: #ff4500;
    --accent2: #ff6b35;
    --gold: #ffd700;
    --green: #00ff88;
    --blue: #00bfff;
    --purple: #9d4edd;
    --text: #f0f0f0;
    --muted: #888;
    --border: rgba(255,69,0,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content:'';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,69,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,69,0,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .hero {
    position: relative;
    text-align: center;
    padding: 60px 20px 40px;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,69,0,0.15) 0%, transparent 70%);
    border-bottom: 1px solid var(--border);
    z-index: 1;
  }

  .hero-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    font-size: 13px;
    padding: 5px 20px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    letter-spacing: 6px;
    line-height: 1;
    background: linear-gradient(135deg, #ff4500, #ffd700, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }

  .hero-sub {
    font-size: 16px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Progress tracker */
  .progress-section {
    position: relative;
    z-index: 1;
    padding: 30px 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .progress-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .progress-bar-outer {
    height: 8px;
    background: var(--card2);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .progress-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 16px;
  }

  .dot {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Rajdhani', sans-serif;
  }

  .dot:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.1); }
  .dot.done { background: var(--accent); border-color: var(--accent); color: white; }
  .dot.today { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.4); }
  .dot.rest { background: var(--bg3); border-color: var(--purple); color: var(--purple); }

  /* Week filters */
  .filters {
    position: relative;
    z-index: 1;
    padding: 0 20px 20px;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-right: 5px;
  }

  .filter-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    border-radius: 3px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Days grid */
  .days-container {
    position: relative;
    z-index: 1;
    padding: 0 20px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .week-section {
    margin-bottom: 40px;
  }

  .week-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .week-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    letter-spacing: 3px;
    line-height: 1;
  }

  .week-info {
    flex: 1;
  }

  .week-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .week-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .week-intensity {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .intensity-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }

  .intensity-dot.filled { background: var(--accent); }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.3s;
    position: relative;
  }

  .day-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,69,0,0.15);
  }

  .day-card.rest-day {
    border-color: rgba(157,78,221,0.3);
    background: linear-gradient(135deg, var(--card), rgba(157,78,221,0.05));
  }

  .day-card.completed {
    border-color: rgba(0,255,136,0.3);
  }

  .day-card.completed::after {
    content: '✓';
    position: absolute;
    top: 12px;
    right: 12px;
    width: 24px;
    height: 24px;
    background: var(--green);
    color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 900;
  }

  .day-header {
    padding: 14px 16px 12px;
    background: linear-gradient(135deg, rgba(255,69,0,0.08), transparent);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .day-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: var(--accent);
    line-height: 1;
    letter-spacing: 2px;
    min-width: 52px;
  }

  .day-header-info { flex: 1; }

  .day-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text);
  }

  .day-focus {
    font-size: 11px;
    color: var(--accent2);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .day-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .tag {
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Rajdhani', sans-serif;
  }

  .tag-hiit { background: rgba(255,69,0,0.2); color: var(--accent); border: 1px solid rgba(255,69,0,0.3); }
  .tag-strength { background: rgba(0,191,255,0.1); color: var(--blue); border: 1px solid rgba(0,191,255,0.3); }
  .tag-cardio { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
  .tag-rest { background: rgba(157,78,221,0.1); color: var(--purple); border: 1px solid rgba(157,78,221,0.3); }
  .tag-core { background: rgba(255,215,0,0.1); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }

  .day-body { padding: 14px 16px; }

  .exercises-list { list-style: none; }

  .exercise-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .exercise-item:last-child { border-bottom: none; }

  .ex-icon {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
  }

  .ex-details { flex: 1; min-width: 0; }

  .ex-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .ex-params {
    font-size: 12px;
    color: var(--accent2);
    font-weight: 600;
    margin-top: 1px;
  }

  .ex-muscle {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  .ex-how {
    font-size: 10px;
    color: var(--blue);
    margin-top: 3px;
    line-height: 1.4;
    font-style: italic;
  }

  .ex-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 5px;
    padding: 3px 10px;
    background: rgba(255,69,0,0.1);
    border: 1px solid rgba(255,69,0,0.3);
    border-radius: 3px;
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 1px;
    font-family: 'Rajdhani', sans-serif;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .ex-link:hover {
    background: var(--accent);
    color: white;
  }

  .rest-card-body {
    padding: 24px 16px;
    text-align: center;
  }

  .rest-icon { font-size: 40px; margin-bottom: 12px; }

  .rest-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--purple);
  }

  .rest-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.6;
  }

  .rest-tips {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .rest-tip {
    padding: 4px 12px;
    background: rgba(157,78,221,0.1);
    border: 1px solid rgba(157,78,221,0.3);
    border-radius: 20px;
    font-size: 11px;
    color: var(--purple);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
  }

  .complete-btn {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .complete-btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,255,136,0.05);
  }

  .complete-btn.done {
    border-color: var(--green);
    background: rgba(0,255,136,0.1);
    color: var(--green);
  }

  .day-duration {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--bg3);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .duration-icon { font-size: 13px; }

  /* Collapsible */
  .collapse-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .collapse-btn.open { transform: rotate(180deg); color: var(--accent); }

  .collapsible { display: none; }
  .collapsible.open { display: block; }

  /* Legend */
  .legend {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding: 0 20px 20px;
    max-width: 1400px;
    margin: 0 auto;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  @media (max-width: 600px) {
    .days-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 20px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">💪 TABABAR BUUXA</div>
  <h1>50 MAALMOOD</h1>
  <div class="hero-sub">Calool Jar · Dufan Gub · Murqo Samee — Jirka Oo Dhan</div>
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num">50</div>

    <div class="stat-item">

<!-- Progress -->
<div class="progress-section">

    <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>

</div>

<!-- Legend -->
<div class="legend">
  <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:'Rajdhani',sans-serif;font-weight:700;">Calaamadaha:</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> La Dhammeeyay</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div> Maantay</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> Nasasho</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div> Soo Socda</div>
</div>

<!-- Filters -->
<div class="filters">
  <span class="filter-label">Fiiri:</span>
  <button class="filter-btn active" onclick="filterWeek('all', this)">Dhamaan</button>
  <button class="filter-btn" onclick="filterWeek(1, this)">Isbuuc 1</button>
  <button class="filter-btn" onclick="filterWeek(2, this)">Isbuuc 2</button>
  <button class="filter-btn" onclick="filterWeek(3, this)">Isbuuc 3</button>
  <button class="filter-btn" onclick="filterWeek(4, this)">Isbuuc 4</button>
  <button class="filter-btn" onclick="filterWeek(5, this)">Isbuuc 5</button>
  <button class="filter-btn" onclick="filterWeek(6, this)">Isbuuc 6</button>
  <button class="filter-btn" onclick="filterWeek(7, this)">Isbuuc 7</button>
</div>

<!-- Days -->
<div class="days-container" id="daysContainer"></div>

// ============================
// STATE
// ============================
let completed = JSON.parse(localStorage.getItem('gym50_completed') || '[]');

function saveCompleted() {
  localStorage.setItem('gym50_completed', JSON.stringify(completed));
}

// ============================
// RENDER
// ============================
function renderDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  let allDays = [];
  weeks.forEach(w => w.days.forEach(d => allDays.push(d)));

  allDays.forEach((d, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (d.isRest ? ' rest' : '') + (completed.includes(d.day) ? ' done' : '');
    if (i === completed.filter(x => !allDays.find(dd => dd.day === x)?.isRest).length && !completed.includes(d.day)) {
      dot.classList.add('today');
    }
    dot.textContent = d.day;
    dot.title = `Maalin ${d.day}: ${d.focus}`;
    dot.onclick = () => scrollToDay(d.day);
    container.appendChild(dot);
  });

  const count = completed.length;
  document.getElementById('completedCount').textContent = count;
  document.getElementById('progressText').textContent = `${count} / 50 Maalmood`;
  document.getElementById('progressBar').style.width = `${(count/50)*100}%`;
}

function scrollToDay(dayNum) {
  const el = document.getElementById('day-' + dayNum);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function toggleComplete(dayNum, btn) {
  if (completed.includes(dayNum)) {
    completed = completed.filter(d => d !== dayNum);
    btn.classList.remove('done');
    btn.textContent = '○ DHAMMAAD KU CALAAMADEE';
    btn.closest('.day-card').classList.remove('completed');
  } else {
    completed.push(dayNum);
    btn.classList.add('done');
    btn.textContent = '✓ LA DHAMMEEYAY!';
    btn.closest('.day-card').classList.add('completed');
  }
  saveCompleted();
  renderDots();
}

function getIntensityDots(level) {
  let html = '';
  for (let i = 1; i <= 9; i++) {
    html += `<div class="intensity-dot${i <= level ? ' filled' : ''}"></div>`;
  }
  return html;
}

function getTagHTML(types) {
  return types.map(t => {
    const map = {hiit:'tag-hiit', strength:'tag-strength', cardio:'tag-cardio', rest:'tag-rest', core:'tag-core'};
    const labels = {hiit:'HIIT', strength:'XOOG', cardio:'CARDIO', rest:'NASASHO', core:'CALOOL'};
    return `<span class="tag ${map[t]}">${labels[t]}</span>`;
  }).join('');
}

function renderDays() {
  const container = document.getElementById('daysContainer');
  container.innerHTML = '';

  weeks.forEach(week => {
    const weekDiv = document.createElement('div');
    weekDiv.className = 'week-section';
    weekDiv.dataset.week = week.week;

    weekDiv.innerHTML = `
      <div class="week-header">
        <div class="week-num">W${week.week}</div>
        <div class="week-info">
          <div class="week-name">${week.name}</div>
          <div class="week-desc">${week.desc}</div>
        </div>
        <div class="week-intensity">${getIntensityDots(week.intensity)}</div>
      </div>
      <div class="days-grid" id="week-grid-${week.week}"></div>
    `;

    container.appendChild(weekDiv);

    const grid = weekDiv.querySelector(`#week-grid-${week.week}`);

    week.days.forEach(day => {
      const card = document.createElement('div');
      card.className = 'day-card' + (day.isRest ? ' rest-day' : '') + (completed.includes(day.day) ? ' completed' : '');
      card.id = 'day-' + day.day;

      if (day.isRest) {
        card.innerHTML = `
          <div class="day-header">
            <div class="day-number">${day.day}</div>
            <div class="day-header-info">
              <div class="day-name">${day.name}</div>
              <div class="day-focus">${day.focus}</div>
              <div class="day-meta">${getTagHTML(day.type)}</div>
            </div>
          </div>
          <div class="rest-card-body">
            <div class="rest-icon">😴</div>
            <div class="rest-title">MAALIN NASASHO</div>
            <div class="rest-desc">Murqaha waxay kuu baahan yihiin in ay dib isu dhisaan. Nasashada ayaa ka muhiimsan jimicsiga maalinaha nasashada!</div>
            <div class="rest-tips">
              ${day.restTips.map(t => `<span class="rest-tip">✓ ${t}</span>`).join('')}
            </div>
          </div>
          <div class="day-duration"><span class="duration-icon">⏱</span>${day.duration}</div>
        `;
      } else {
        const exHTML = day.exercises.map(ex => `
          <li class="exercise-item">
            <div class="ex-icon">${ex.icon}</div>
            <div class="ex-details">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-params">${ex.params}</div>
              <div class="ex-muscle">🎯 ${ex.muscle}</div>
              <div class="ex-how">📋 ${ex.how}</div>
              <a href="${ex.link}" target="_blank" class="ex-link">▶ MUUQAAL FIIRI</a>
            </div>
          </li>
        `).join('');

        const isCompleted = completed.includes(day.day);
        card.innerHTML = `
          <div class="day-header">
            <div class="day-number">${day.day}</div>
            <div class="day-header-info">
              <div class="day-name">${day.name}</div>
              <div class="day-focus">${day.focus}</div>
              <div class="day-meta">${getTagHTML(day.type)}</div>
            </div>
            <button class="collapse-btn open" onclick="toggleCollapse(this, 'body-${day.day}')">▼</button>
          </div>
          <div class="day-body collapsible open" id="body-${day.day}">
            <ul class="exercises-list">${exHTML}</ul>
            <button class="complete-btn ${isCompleted ? 'done' : ''}" onclick="toggleComplete(${day.day}, this)">
              ${isCompleted ? '✓ LA DHAMMEEYAY!' : '○ DHAMMAAD KU CALAAMADEE'}
            </button>
          </div>
          <div class="day-duration"><span class="duration-icon">⏱</span>${day.duration}</div>
        `;
      }

      grid.appendChild(card);
    });
  });
}

function toggleCollapse(btn, bodyId) {
  const body = document.getElementById(bodyId);
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    btn.classList.remove('open');
  } else {
    body.classList.add('open');
    btn.classList.add('open');
  }
}

function filterWeek(week, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.week-section').forEach(ws => {
    if (week === 'all' || parseInt(ws.dataset.week) === week) {
      ws.style.display = '';
    } else {
      ws.style.display = 'none';
    }
  });
}

// ============================
// INIT

renderDays();
renderDots();
</script>
